<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Supabase Job Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #17211b;
      --muted: #607064;
      --line: #d9e2dc;
      --paper: #f7f4ec;
      --card: #fffdf7;
      --accent: #1f6f50;
      --accent-2: #d97a35;
      --danger: #a53838;
      --shadow: 0 18px 50px rgba(30, 43, 35, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(217, 122, 53, 0.16), transparent 32rem),
        radial-gradient(circle at 85% 5%, rgba(31, 111, 80, 0.16), transparent 28rem),
        linear-gradient(135deg, #f8f0df 0%, #edf4ee 100%);
      min-height: 100vh;
    }

    main {
      width: min(1520px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 46px;
    }

    .hero {
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr auto;
      align-items: end;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .subtitle {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 0.94rem;
      line-height: 1.45;
    }

    .panel {
      background: rgba(255, 253, 247, 0.86);
      border: 1px solid rgba(217, 226, 220, 0.9);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .config {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .session {
      display: flex;
      align-items: center;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 0.92rem;
      padding: 0 4px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 190px 150px auto;
      gap: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin: 0 0 12px;
    }

    .tab {
      background: rgba(255, 253, 247, 0.78);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .view[hidden] {
      display: none;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fffefa;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, sans-serif;
      padding: 10px 12px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 111, 80, 0.12);
    }

    button {
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-weight: 700;
      padding: 10px 15px;
      transition: transform 0.16s ease, opacity 0.16s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button.secondary {
      background: #e9eee9;
      color: var(--ink);
    }

    button.warning {
      background: var(--accent-2);
    }

    button.danger {
      background: var(--danger);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      padding: 13px 15px;
    }

    .stat strong {
      display: block;
      font-size: 1.55rem;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 308px);
      border-radius: 20px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 0.9rem;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(247, 244, 236, 0.96);
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 10px 11px;
      text-align: left;
      text-transform: uppercase;
      white-space: nowrap;
    }

    tbody td {
      border-bottom: 1px solid rgba(217, 226, 220, 0.72);
      padding: 9px 11px;
      vertical-align: top;
    }

    tbody tr:hover td {
      background: rgba(255, 255, 255, 0.48);
    }

    .company {
      font-weight: 800;
      white-space: nowrap;
    }

    .role {
      min-width: 260px;
      max-width: 360px;
      font-weight: 700;
    }

    .subtle {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 3px;
    }

    .location {
      max-width: 220px;
      color: #35463b;
    }

    .notes-cell {
      max-width: 360px;
      color: #35463b;
    }

    .truncate {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #e9eee9;
      color: var(--ink);
      font-size: 0.76rem;
      font-weight: 800;
      padding: 5px 9px;
      text-transform: capitalize;
      white-space: nowrap;
    }

    .badge.new { background: #e7f1ff; color: #24547d; }
    .badge.interesting { background: #fff1cf; color: #765411; }
    .badge.promoted { background: #e7f6ee; color: #1f6f50; }
    .badge.duplicate { background: #ececec; color: #555; }
    .badge.tailoring,
    .badge.tailored { background: #e7f6ee; color: #1f6f50; }
    .badge.applied { background: #efe8ff; color: #593b89; }
    .badge.interviewing { background: #daf7ff; color: #196070; }
    .badge.offer { background: #ddf7de; color: #1e6b2b; }
    .badge.rejected,
    .badge.closed,
    .badge.withdrawn { background: #f8e2df; color: #8a302b; }
    .badge.skipped { background: #ececec; color: #555; }
    .badge.dream { background: #ffe5da; color: #9b3f1f; }
    .badge.strong { background: #fff1cf; color: #765411; }
    .badge.normal { background: #e7f6ee; color: #1f6f50; }
    .badge.backup { background: #ececec; color: #555; }

    .row-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      min-width: 190px;
    }

    .row-actions select {
      min-width: 132px;
      padding: 7px 9px;
      border-radius: 999px;
      font-size: 0.8rem;
    }

    .row-actions button,
    .compact-link {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
    }

    .compact-link {
      display: inline-flex;
      background: #e9eee9;
      color: var(--ink);
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .fit {
      font-weight: 900;
      white-space: nowrap;
    }

    .date {
      color: var(--muted);
      white-space: nowrap;
    }

    .num {
      font-weight: 900;
      text-align: right;
      white-space: nowrap;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 0.92rem;
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .empty,
    .message {
      padding: 18px;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, sans-serif;
      line-height: 1.6;
      text-align: center;
    }

    .drawer {
      display: none;
      margin-top: 12px;
      padding: 14px;
      font-family: ui-sans-serif, system-ui, sans-serif;
      line-height: 1.5;
    }

    .drawer[open] {
      display: block;
    }

    .drawer-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 8px 14px;
      font-size: 0.9rem;
    }

    .drawer-grid strong {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    dialog {
      border: 0;
      border-radius: 24px;
      width: min(720px, calc(100% - 30px));
      padding: 0;
      background: var(--card);
      color: var(--ink);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.25);
    }

    dialog::backdrop {
      background: rgba(23, 33, 27, 0.42);
      backdrop-filter: blur(5px);
    }

    .modal {
      padding: 22px;
    }

    .modal h2 {
      margin: 0 0 16px;
      font-size: 2rem;
      letter-spacing: -0.05em;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-grid .wide {
      grid-column: 1 / -1;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    @media (max-width: 860px) {
      .hero,
      .config,
      .toolbar,
      .table-wrap {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .table-wrap {
        max-height: none;
      }

      table {
        min-width: 980px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <h1>Job tracker</h1>
        <p class="subtitle">
          Fresh Supabase-backed pipeline for researched roles, tailored resumes, and final application status.
          This dashboard does not read the old CSV.
        </p>
      </div>
      <div>
      <button id="addJobButton">Add pipeline job</button>
      <button id="addCompanyButton" class="secondary">Add company</button>
      </div>
    </section>

    <section class="config panel">
      <input id="emailInput" type="email" placeholder="Email">
      <input id="passwordInput" type="password" placeholder="Password">
      <button id="signInButton">Sign in</button>
      <button id="signOutButton" class="secondary" hidden>Sign out</button>
      <div id="sessionLabel" class="session">Not signed in</div>
    </section>

    <section class="tabs">
      <button id="researchTabButton" class="tab" type="button">Research Inbox</button>
      <button id="jobsTabButton" class="tab active" type="button">Pipeline</button>
      <button id="companiesTabButton" class="tab" type="button">Companies</button>
    </section>

    <section id="researchView" class="view" hidden>
      <section class="toolbar panel">
        <input id="researchSearchInput" type="search" placeholder="Search researched jobs, company, role, reasoning">
        <select id="researchDecisionFilter">
          <option value="">All decisions</option>
          <option value="interesting">Interesting</option>
          <option value="promoted">Promoted</option>
          <option value="skipped">Skipped</option>
          <option value="closed">Closed</option>
          <option value="duplicate">Duplicate</option>
        </select>
        <select id="researchSortSelect">
          <option value="fit_score.desc">Best fit</option>
          <option value="discovered_at.desc">Newest</option>
          <option value="company.asc">Company</option>
        </select>
        <button id="refreshResearchButton" class="secondary">Refresh</button>
      </section>
    </section>

    <section id="jobsView" class="view">
      <section class="toolbar panel">
        <input id="searchInput" type="search" placeholder="Search company, role, location, notes">
        <select id="statusFilter">
          <option value="">All statuses</option>
          <option value="tailoring">Tailoring</option>
          <option value="tailored">Tailored</option>
          <option value="applied">Applied</option>
          <option value="interviewing">Interviewing</option>
          <option value="offer">Offer</option>
          <option value="rejected">Rejected</option>
          <option value="withdrawn">Withdrawn</option>
        </select>
        <select id="sortSelect">
          <option value="applied_at.desc">Recently active</option>
          <option value="created_at.desc">Newest added</option>
          <option value="fit_score.desc">Best fit</option>
          <option value="company.asc">Company</option>
        </select>
        <button id="refreshButton" class="secondary">Refresh</button>
      </section>

      <section class="stats">
        <div class="stat panel"><strong id="statTotal">0</strong><span>Total</span></div>
        <div class="stat panel"><strong id="statNew">0</strong><span>Tailoring</span></div>
        <div class="stat panel"><strong id="statShortlisted">0</strong><span>Ready</span></div>
        <div class="stat panel"><strong id="statTailored">0</strong><span>Applied</span></div>
        <div class="stat panel"><strong id="statApplied">0</strong><span>Active Apps</span></div>
      </section>
    </section>

    <section id="companiesView" class="view" hidden>
      <section class="toolbar panel">
        <input id="companySearchInput" type="search" placeholder="Search company, priority, notes">
        <select id="companyPriorityFilter">
          <option value="">All priorities</option>
          <option value="dream">Dream</option>
          <option value="strong">Strong</option>
          <option value="normal">Normal</option>
          <option value="backup">Backup</option>
        </select>
        <select id="companySortSelect">
          <option value="priority">Priority</option>
          <option value="applied">Most applied</option>
          <option value="zero">Zero applied first</option>
          <option value="name">Company</option>
        </select>
        <button id="refreshCompaniesButton" class="secondary">Refresh</button>
      </section>
    </section>

    <section id="message" class="message panel" hidden></section>
    <section id="jobsGrid" class="table-wrap panel"></section>
  </main>

  <dialog id="jobDialog">
    <form id="jobForm" class="modal" method="dialog">
      <h2>Add job</h2>
      <div class="form-grid">
        <input id="companyInput" name="company" placeholder="Company" required>
        <input id="roleInput" name="role" placeholder="Role" required>
        <input id="urlInput" name="url" class="wide" type="url" placeholder="Job URL" required>
        <input id="locationInput" name="location" placeholder="Location">
        <input id="fitInput" name="fit_score" type="number" min="0" max="100" placeholder="Fit score">
        <textarea id="reasonInput" name="reason" class="wide" placeholder="Why this role fits"></textarea>
        <textarea id="notesInput" name="notes" class="wide" placeholder="Notes"></textarea>
        <textarea id="descriptionInput" name="job_description" class="wide" placeholder="Job description"></textarea>
      </div>
      <div class="modal-actions">
        <button id="cancelAddButton" type="button" class="secondary">Cancel</button>
        <button type="submit">Save job</button>
      </div>
    </form>
  </dialog>

  <dialog id="companyDialog">
    <form id="companyForm" class="modal" method="dialog">
      <h2>Add company</h2>
      <div class="form-grid">
        <input id="companyNameInput" name="name" placeholder="Company" required>
        <select id="companyPriorityInput" name="priority">
          <option value="">No priority</option>
          <option value="dream">Dream</option>
          <option value="strong">Strong</option>
          <option value="normal">Normal</option>
          <option value="backup">Backup</option>
        </select>
        <input id="companyWebsiteInput" name="website" class="wide" type="url" placeholder="Website">
        <input id="companyCareersInput" name="careers_url" class="wide" type="url" placeholder="Careers URL">
        <textarea id="companyNotesInput" name="notes" class="wide" placeholder="Personal notes"></textarea>
      </div>
      <div class="modal-actions">
        <button id="cancelCompanyButton" type="button" class="secondary">Cancel</button>
        <button type="submit">Save company</button>
      </div>
    </form>
  </dialog>

  <script>
    const SUPABASE_URL = "https://rztpwtpqmjkqnbojbujj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6dHB3dHBxbWprcW5ib2pidWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NzQ0NDMsImV4cCI6MjA5MzI1MDQ0M30.svMEjBf9gg-vZSLzG8Uf42pd9gcPG1DqRnWgw_lYcUA";
    const STATUS_LABELS = {
      new: "New",
      interesting: "Interesting",
      promoted: "Promoted",
      duplicate: "Duplicate",
      tailoring: "Tailoring",
      tailored: "Tailored",
      applied: "Applied",
      interviewing: "Interviewing",
      offer: "Offer",
      rejected: "Rejected",
      withdrawn: "Withdrawn",
      closed: "Closed",
      skipped: "Skipped"
    };
    const STATUS_TRANSITIONS = {
      tailoring: ["tailored", "withdrawn"],
      tailored: ["applied", "tailoring", "withdrawn"],
      applied: ["interviewing", "rejected", "withdrawn", "tailored"],
      interviewing: ["offer", "applied", "rejected", "withdrawn"],
      offer: ["interviewing", "applied", "withdrawn"],
      rejected: ["applied", "interviewing", "withdrawn"],
      withdrawn: ["applied", "tailored", "tailoring"]
    };

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let jobs = [];
    let researchedJobs = [];
    let companies = [];
    let activeView = "jobs";

    const els = {
      emailInput: document.querySelector("#emailInput"),
      passwordInput: document.querySelector("#passwordInput"),
      signInButton: document.querySelector("#signInButton"),
      signOutButton: document.querySelector("#signOutButton"),
      sessionLabel: document.querySelector("#sessionLabel"),
      addJobButton: document.querySelector("#addJobButton"),
      addCompanyButton: document.querySelector("#addCompanyButton"),
      researchTabButton: document.querySelector("#researchTabButton"),
      jobsTabButton: document.querySelector("#jobsTabButton"),
      companiesTabButton: document.querySelector("#companiesTabButton"),
      researchView: document.querySelector("#researchView"),
      jobsView: document.querySelector("#jobsView"),
      companiesView: document.querySelector("#companiesView"),
      refreshResearchButton: document.querySelector("#refreshResearchButton"),
      refreshButton: document.querySelector("#refreshButton"),
      refreshCompaniesButton: document.querySelector("#refreshCompaniesButton"),
      researchSearchInput: document.querySelector("#researchSearchInput"),
      researchDecisionFilter: document.querySelector("#researchDecisionFilter"),
      researchSortSelect: document.querySelector("#researchSortSelect"),
      searchInput: document.querySelector("#searchInput"),
      statusFilter: document.querySelector("#statusFilter"),
      sortSelect: document.querySelector("#sortSelect"),
      companySearchInput: document.querySelector("#companySearchInput"),
      companyPriorityFilter: document.querySelector("#companyPriorityFilter"),
      companySortSelect: document.querySelector("#companySortSelect"),
      jobsGrid: document.querySelector("#jobsGrid"),
      message: document.querySelector("#message"),
      jobDialog: document.querySelector("#jobDialog"),
      jobForm: document.querySelector("#jobForm"),
      cancelAddButton: document.querySelector("#cancelAddButton"),
      companyDialog: document.querySelector("#companyDialog"),
      companyForm: document.querySelector("#companyForm"),
      cancelCompanyButton: document.querySelector("#cancelCompanyButton"),
      statTotal: document.querySelector("#statTotal"),
      statNew: document.querySelector("#statNew"),
      statShortlisted: document.querySelector("#statShortlisted"),
      statTailored: document.querySelector("#statTailored"),
      statApplied: document.querySelector("#statApplied")
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showMessage(text, isError = false) {
      els.message.hidden = false;
      els.message.textContent = text;
      els.message.style.color = isError ? "var(--danger)" : "var(--muted)";
    }

    function clearMessage() {
      els.message.hidden = true;
      els.message.textContent = "";
    }

    async function refreshSession() {
      const { data } = await client.auth.getUser();
      currentUser = data.user || null;
      els.sessionLabel.textContent = currentUser ? `Signed in as ${currentUser.email}` : "Not signed in";
      els.signInButton.hidden = Boolean(currentUser);
      els.signOutButton.hidden = !currentUser;
      els.emailInput.hidden = Boolean(currentUser);
      els.passwordInput.hidden = Boolean(currentUser);
      els.addJobButton.disabled = !currentUser;
      els.addCompanyButton.disabled = !currentUser;
      els.refreshResearchButton.disabled = !currentUser;
      els.refreshButton.disabled = !currentUser;
      els.refreshCompaniesButton.disabled = !currentUser;
      if (currentUser) {
        await loadAllData();
      } else {
        jobs = [];
        researchedJobs = [];
        companies = [];
        renderActiveView();
        showMessage("Sign in to view and update your jobs.");
      }
    }

    async function signIn() {
      clearMessage();
      const email = els.emailInput.value.trim();
      const password = els.passwordInput.value;
      if (!email || !password) {
        showMessage("Enter email and password.", true);
        return;
      }

      const { error } = await client.auth.signInWithPassword({ email, password });
      if (error) {
        showMessage(error.message, true);
        return;
      }

      els.passwordInput.value = "";
      await refreshSession();
    }

    async function signOut() {
      await client.auth.signOut();
      await refreshSession();
    }

    function setActiveView(view) {
      activeView = view;
      els.researchView.hidden = view !== "research";
      els.jobsView.hidden = view !== "jobs";
      els.companiesView.hidden = view !== "companies";
      els.researchTabButton.classList.toggle("active", view === "research");
      els.jobsTabButton.classList.toggle("active", view === "jobs");
      els.companiesTabButton.classList.toggle("active", view === "companies");
      renderActiveView();
    }

    function renderActiveView() {
      if (activeView === "research") {
        renderResearchTable();
      } else if (activeView === "companies") {
        renderCompaniesTable();
      } else {
        renderJobsTable();
      }
    }

    async function loadAllData() {
      await loadResearchedJobs(false);
      await loadJobs(false);
      await loadCompanies(false);
      renderActiveView();
    }

    function researchSortOptions() {
      const [column, direction] = els.researchSortSelect.value.split(".");
      return { column, ascending: direction === "asc" };
    }

    async function loadResearchedJobs(render = true) {
      if (!currentUser) {
        renderActiveView();
        showMessage("Sign in to view researched jobs.");
        return;
      }

      clearMessage();
      const { column, ascending } = researchSortOptions();
      const { data, error } = await client
        .from("researched_jobs")
        .select("*")
        .order(column, { ascending, nullsFirst: false })
        .order("discovered_at", { ascending: false });

      if (error) {
        renderActiveView();
        showMessage(error.message, true);
        return;
      }

      researchedJobs = data || [];
      if (render) renderActiveView();
    }

    function sortOptions() {
      const [column, direction] = els.sortSelect.value.split(".");
      return { column, ascending: direction === "asc" };
    }

    async function loadJobs(render = true) {
      if (!currentUser) {
        renderActiveView();
        showMessage("Sign in to view and update your jobs.");
        return;
      }

      clearMessage();
      const { column, ascending } = sortOptions();
      const { data, error } = await client
        .from("jobs")
        .select("*")
        .order(column, { ascending, nullsFirst: false })
        .order("created_at", { ascending: false });

      if (error) {
        renderActiveView();
        showMessage(error.message, true);
        return;
      }

      jobs = data || [];
      if (render) renderActiveView();
    }

    async function loadCompanies(render = true) {
      if (!currentUser) {
        renderActiveView();
        showMessage("Sign in to view and update your companies.");
        return;
      }

      clearMessage();
      const { data, error } = await client
        .from("companies")
        .select("*")
        .order("name", { ascending: true });

      if (error) {
        renderActiveView();
        showMessage(error.message, true);
        return;
      }

      companies = data || [];
      if (render) renderActiveView();
    }

    function filteredJobs() {
      const term = els.searchInput.value.trim().toLowerCase();
      const status = els.statusFilter.value;
      return jobs.filter((job) => {
        const statusOk = !status || job.status === status;
        const haystack = [
          job.company,
          job.role,
          job.location,
          job.reason,
          job.notes,
          job.source,
          job.base_resume,
          job.draft_resume_path
        ].join(" ").toLowerCase();
        return statusOk && (!term || haystack.includes(term));
      });
    }

    function filteredResearchedJobs() {
      const term = els.researchSearchInput.value.trim().toLowerCase();
      const decision = els.researchDecisionFilter.value;
      return researchedJobs.filter((job) => {
        const decisionOk = !decision || job.decision === decision;
        const haystack = [
          job.company,
          job.role,
          job.location,
          job.source,
          job.fit_reason,
          job.research_notes,
          job.job_description
        ].join(" ").toLowerCase();
        return decisionOk && (!term || haystack.includes(term));
      });
    }

    function normalizeCompanyName(name) {
      return String(name || "")
        .toLowerCase()
        .replaceAll("&", "and")
        .replace(/\b(inc|corp|corporation|company|systems|technology|technologies|design systems|labs|lab)\b/g, "")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function jobsForCompany(companyName) {
      const normalized = normalizeCompanyName(companyName);
      return jobs.filter((job) => {
        const jobCompany = normalizeCompanyName(job.company);
        return jobCompany === normalized || jobCompany.includes(normalized) || normalized.includes(jobCompany);
      });
    }

    function companyStats(company) {
      const relatedJobs = jobsForCompany(company.name);
      return {
        total: relatedJobs.length,
        applied: relatedJobs.filter((job) => ["applied", "interviewing", "offer", "rejected", "withdrawn"].includes(job.status)).length,
        active: relatedJobs.filter((job) => ["applied", "interviewing", "offer"].includes(job.status)).length,
        rejected: relatedJobs.filter((job) => job.status === "rejected").length,
        latest: relatedJobs
          .map((job) => job.applied_at || job.updated_at || job.created_at)
          .filter(Boolean)
          .sort()
          .at(-1)
      };
    }

    function priorityRank(priority) {
      return { dream: 0, strong: 1, normal: 2, backup: 3 }[priority] ?? 4;
    }

    function filteredCompanies() {
      const term = els.companySearchInput.value.trim().toLowerCase();
      const priority = els.companyPriorityFilter.value;
      let visibleCompanies = companies.filter((company) => {
        const priorityOk = !priority || company.priority === priority;
        const haystack = [
          company.name,
          company.priority,
          company.website,
          company.careers_url,
          company.notes
        ].join(" ").toLowerCase();
        return priorityOk && (!term || haystack.includes(term));
      });

      const sort = els.companySortSelect.value;
      visibleCompanies = [...visibleCompanies].sort((a, b) => {
        const aStats = companyStats(a);
        const bStats = companyStats(b);
        if (sort === "applied") return bStats.applied - aStats.applied || a.name.localeCompare(b.name);
        if (sort === "zero") return Number(aStats.applied > 0) - Number(bStats.applied > 0) || a.name.localeCompare(b.name);
        if (sort === "name") return a.name.localeCompare(b.name);
        return priorityRank(a.priority) - priorityRank(b.priority) || a.name.localeCompare(b.name);
      });

      return visibleCompanies;
    }

    function renderStats(sourceJobs) {
      els.statTotal.textContent = sourceJobs.length;
      els.statNew.textContent = sourceJobs.filter((job) => job.status === "tailoring").length;
      els.statShortlisted.textContent = sourceJobs.filter((job) => job.status === "tailored").length;
      els.statTailored.textContent = sourceJobs.filter((job) => job.status === "applied").length;
      els.statApplied.textContent = sourceJobs.filter((job) => ["applied", "interviewing", "offer"].includes(job.status)).length;
    }

    function formatDate(value) {
      if (!value) return "";
      return new Date(value).toLocaleDateString(undefined, { month: "short", day: "numeric" });
    }

    function statusBadge(status) {
      return `<span class="badge ${escapeHtml(status)}">${escapeHtml(STATUS_LABELS[status] || status)}</span>`;
    }

    function actionSelect(job) {
      const transitions = STATUS_TRANSITIONS[job.status] || [];
      if (!transitions.length) {
        return `<span class="subtle">No next action</span>`;
      }

      const options = transitions
        .map((status) => `<option value="${escapeHtml(status)}">${escapeHtml(STATUS_LABELS[status] || status)}</option>`)
        .join("");

      return `
        <select data-id="${escapeHtml(job.id)}" aria-label="Next status for ${escapeHtml(job.company)} ${escapeHtml(job.role)}">
          <option value="">Next status</option>
          ${options}
        </select>
      `;
    }

    function detailDrawer(job) {
      const applied = job.applied_at ? new Date(job.applied_at).toLocaleString() : "Not applied";
      const created = job.created_at ? new Date(job.created_at).toLocaleString() : "Unknown";
      const updated = job.updated_at ? new Date(job.updated_at).toLocaleString() : "Unknown";
      const details = [
        ["Reason", job.reason || "None"],
        ["Notes", job.notes || "None"],
        ["Base resume", job.base_resume || "None"],
        ["Draft", job.draft_resume_path || "None"],
        ["PDF", job.pdf_path || "None"],
        ["Source", job.source || "None"],
        ["Applied", applied],
        ["Created", created],
        ["Updated", updated]
      ];

      return `
        <div id="drawer-${escapeHtml(job.id)}" class="drawer panel">
          <div class="drawer-grid">
            ${details.map(([label, value]) => `<strong>${escapeHtml(label)}</strong><span>${escapeHtml(value)}</span>`).join("")}
          </div>
        </div>
      `;
    }

    function researchDrawer(job) {
      const details = [
        ["Fit reason", job.fit_reason || "None"],
        ["Research notes", job.research_notes || "None"],
        ["Description", job.job_description || "None"],
        ["Source", job.source || "None"],
        ["Open", job.is_open ? "Yes" : "No"],
        ["Discovered", job.discovered_at ? new Date(job.discovered_at).toLocaleString() : "Unknown"],
        ["Last seen", job.last_seen_at ? new Date(job.last_seen_at).toLocaleString() : "Unknown"]
      ];

      return `
        <div id="drawer-${escapeHtml(job.id)}" class="drawer panel">
          <div class="drawer-grid">
            ${details.map(([label, value]) => `<strong>${escapeHtml(label)}</strong><span>${escapeHtml(value)}</span>`).join("")}
          </div>
        </div>
      `;
    }

    function researchDecisionSelect(job) {
      if (job.decision === "promoted") {
        return `<span class="subtle">In pipeline</span>`;
      }

      const decisions = ["new", "interesting", "skipped", "closed", "duplicate"];
      const options = decisions
        .filter((decision) => decision !== job.decision)
        .map((decision) => `<option value="${escapeHtml(decision)}">${escapeHtml(STATUS_LABELS[decision] || decision)}</option>`)
        .join("");

      return `
        <select data-research-id="${escapeHtml(job.id)}" aria-label="Decision for ${escapeHtml(job.company)} ${escapeHtml(job.role)}">
          <option value="">Set decision</option>
          ${options}
        </select>
      `;
    }

              <th>Total Jobs</th>

              <th>Notes</th>
              <th>Links</th>

    async function updateStatus(id, status) {
      const patch = { status };
      if (status === "applied") {
        patch.applied_at = new Date().toISOString();
      }

      const { error } = await client
        .from("jobs")
        .update(patch)
        .eq("id", id);

      if (error) {
        showMessage(error.message, true);
        return;
      }

      jobs = jobs.map((job) => job.id === id ? { ...job, ...patch } : job);
      renderJobsTable();
    }

      event.preventDefault();
      if (!currentUser) {
        showMessage("Sign in before adding jobs.", true);
        return;
      }

      const fitValue = document.querySelector("#fitInput").value;
      const payload = {
        company: document.querySelector("#companyInput").value.trim(),
        role: document.querySelector("#roleInput").value.trim(),
        url: document.querySelector("#urlInput").value.trim(),
        location: document.querySelector("#locationInput").value.trim() || null,
        fit_score: fitValue ? Number(fitValue) : null,
        reason: document.querySelector("#reasonInput").value.trim() || null,
        notes: document.querySelector("#notesInput").value.trim() || null,
        job_description: document.querySelector("#descriptionInput").value.trim() || null,

      };

      const { error } = await client.from("jobs").insert(payload);
      if (error) {

    async function updateResearchDecision(id, decision) {
      const patch = {
        decision,
        is_open: !["closed", "duplicate"].includes(decision)
      };

      const { error } = await client
        .from("researched_jobs")
        .update(patch)
        .eq("id", id);

      if (error) {
        showMessage(error.message, true);
        return;
      }

      researchedJobs = researchedJobs.map((job) => job.id === id ? { ...job, ...patch } : job);
      renderResearchTable();
    }

    async function promoteResearchJob(id) {
      const researchJob = researchedJobs.find((job) => job.id === id);
      if (!researchJob) return;

      const existing = jobs.find((job) => (
        job.url === researchJob.url ||
        (
          normalizeCompanyName(job.company) === normalizeCompanyName(researchJob.company) &&
          job.role.trim().toLowerCase() === researchJob.role.trim().toLowerCase()
        )
      ));

      if (existing) {
        const { error } = await client
          .from("jobs")
          .update({ researched_job_id: researchJob.id, status: existing.status || "tailoring" })
          .eq("id", existing.id);

        if (error) {
          showMessage(error.message, true);
          return;
        }

        await client
          .from("researched_jobs")
          .update({ decision: "promoted", promoted_job_id: existing.id })
          .eq("id", researchJob.id);
      } else {
        const payload = {
          researched_job_id: researchJob.id,
          company: researchJob.company,
          role: researchJob.role,
          url: researchJob.url,
          location: researchJob.location,
          status: "tailoring",
          fit_score: researchJob.fit_score,
          reason: researchJob.fit_reason,
          job_description: researchJob.job_description,
          source: researchJob.source || "research_inbox"
        };

        const { data, error } = await client
          .from("jobs")
          .insert(payload)
          .select("id")
          .single();

        if (error) {
          showMessage(error.message, true);
          return;
        }

        await client
          .from("researched_jobs")
          .update({ decision: "promoted", promoted_job_id: data.id })
          .eq("id", researchJob.id);
      }

      await loadAllData();
      setActiveView("jobs");
    }

    els.jobsGrid.addEventListener("click", (event) => {
      const promoteButton = event.target.closest("button[data-promote]");
      if (promoteButton && currentUser) {
        promoteResearchJob(promoteButton.dataset.promote);
        return;
      }

      const button = event.target.closest("button[data-toggle]");
      if (!button) return;
      const drawer = document.querySelector(`#drawer-${CSS.escape(button.dataset.toggle)}`);
      if (!drawer) return;
      drawer.toggleAttribute("open");
    });
    els.jobsGrid.addEventListener("change", (event) => {
      const researchSelect = event.target.closest("select[data-research-id]");
      if (researchSelect && currentUser && researchSelect.value) {
        updateResearchDecision(researchSelect.dataset.researchId, researchSelect.value);
        return;
      }

      const select = event.target.closest("select[data-id]");
      if (!select || !currentUser || !select.value) return;
      updateStatus(select.dataset.id, select.value);
    });

    client.auth.onAuthStateChange(() => {
      refreshSession();
    });
    refreshSession();
  </script>
</body>
</html>
